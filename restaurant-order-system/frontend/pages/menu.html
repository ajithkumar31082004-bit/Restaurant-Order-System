<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — FoodHub</title>
  <meta name="description" content="Explore our full menu of fresh biryanis, pizzas, burgers, desserts and more. Filter by category, price, veg/non-veg.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <div class="page-header">
    <div class="container">
      <h1><i class="fa-solid fa-utensils me-2"></i>Our Menu</h1>
      <p>Explore our delicious offerings — filtered your way</p>
    </div>
  </div>

  <section class="py-5">
    <div class="container">

      <!-- Filter Bar -->
      <div class="glass-card filter-bar no-hover mb-4" data-aos="fade-up">
        <div class="flex-grow-1" style="min-width:200px">
          <div class="input-group">
            <span class="input-group-text" style="background:var(--bg-card);border:1.5px solid var(--border);border-right:none;border-radius:12px 0 0 12px">
              <i class="fa-solid fa-magnifying-glass text-muted"></i>
            </span>
            <input type="text" class="form-control" id="search-input" placeholder="Search foods..."
                   style="border-left:none;border-radius:0 12px 12px 0 !important">
          </div>
        </div>

        <select class="form-select" style="width:auto;min-width:150px" id="filter-category">
          <option value="">All Categories</option>
        </select>

        <select class="form-select" style="width:auto;min-width:140px" id="filter-sort">
          <option value="">Sort By</option>
          <option value="rating">⭐ Rating</option>
          <option value="price_asc">Price: Low → High</option>
          <option value="price_desc">Price: High → Low</option>
          <option value="name">Name A–Z</option>
        </select>

        <div class="d-flex gap-2 flex-wrap">
          <span class="filter-chip" data-filter="is_veg" data-value="true">
            <span style="display:inline-block;width:10px;height:10px;background:#28a745;border-radius:50%;margin-right:4px"></span>Veg
          </span>
          <span class="filter-chip" data-filter="is_veg" data-value="false">
            <span style="display:inline-block;width:10px;height:10px;background:#dc3545;border-radius:50%;margin-right:4px"></span>Non-Veg
          </span>
          <span class="filter-chip" data-filter="hasOffer" data-value="true">
            <i class="fa-solid fa-tag me-1"></i>Offers
          </span>
          <span class="filter-chip" data-filter="bestseller" data-value="true">
            <i class="fa-solid fa-fire me-1"></i>Best Sellers
          </span>
        </div>

        <button class="btn btn-sm" id="clear-filters" style="background:var(--primary-light);color:var(--primary);border:none;border-radius:8px;font-weight:600;font-size:0.8rem;white-space:nowrap">
          <i class="fa-solid fa-xmark me-1"></i>Clear
        </button>
      </div>

      <!-- AI Recommendations -->
      <div id="ai-recommends-container" style="display:none;" class="mb-4">
        <div class="glass-card no-hover p-4 border" style="border-radius:18px; border: 1.5px solid var(--primary); background: var(--primary-light);">
          <h5 class="fw-bold mb-3" style="color:var(--primary)"><i class="fa-solid fa-wand-magic-sparkles me-2"></i>AI Smart Picks for You</h5>
          <div class="row g-3" id="ai-recommends-grid">
            <!-- AI recommendations go here -->
          </div>
        </div>
      </div>

      <!-- Results count -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="text-muted small" id="results-count"></span>
        <span class="text-muted small">
          <i class="fa-solid fa-circle me-1" style="font-size:0.5rem;color:#28a745;vertical-align:middle"></i>Veg &nbsp;
          <i class="fa-solid fa-circle me-1" style="font-size:0.5rem;color:#dc3545;vertical-align:middle"></i>Non-Veg
        </span>
      </div>

      <!-- Foods Grid -->
      <div class="row" id="foods-grid">
        <!-- Skeleton -->
      </div>
    </div>
  </section>

  <!-- Quick View Modal -->
  <div class="modal fade" id="quickViewModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="qv-name"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="qv-body"></div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    if (typeof AOS !== 'undefined') {
      AOS.init({ duration: 800, once: true });
    }
    try {
      document.getElementById('navbar').innerHTML = Components.navbar('menu');
      document.getElementById('footer').innerHTML = Components.footer();
    } catch(e) { console.warn('Components init failed:', e); }
    try { Theme.init(); } catch(e) {}
    try { Cart.updateBadge(); } catch(e) {}

    let activeFilters = {};
    const params = new URLSearchParams(window.location.search);
    if (params.get('category'))    activeFilters.category    = params.get('category');
    if (params.get('offers') === 'true')  activeFilters.hasOffer  = 'true';

    async function loadCategories() {
      try {
        const res = await API.getCategories();
        const select = document.getElementById('filter-category');
        (res.data || []).forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          if (activeFilters.category == c.id) opt.selected = true;
          select.appendChild(opt);
        });
      } catch (e) { console.warn(e); }
    }

    async function loadFoods() {
      const grid = document.getElementById('foods-grid');
      // Show skeletons
      grid.innerHTML = Utils.skeletonCards(8);
      try {
        const query = { ...activeFilters };
        const search = document.getElementById('search-input').value.trim();
        if (search) query.search = search;
        const sort = document.getElementById('filter-sort').value;
        if (sort) query.sort = sort;

        const res = await API.getFoods(query);
        const foods = res.data || [];

        document.getElementById('results-count').textContent =
          `Showing ${foods.length} result${foods.length !== 1 ? 's' : ''}`;

        if (foods.length === 0) {
          grid.innerHTML = `
            <div class="col-12 text-center py-5">
              <i class="fa-solid fa-magnifying-glass fa-3x text-muted mb-3"></i>
              <p class="text-muted">No foods found matching your filters.</p>
              <button class="btn btn-primary-custom btn-sm" onclick="clearAllFilters()">Clear Filters</button>
            </div>`;
          return;
        }

        grid.innerHTML = foods.map(f => Components.foodCard(f)).join('');
        if (typeof AOS !== 'undefined') {
          AOS.refreshHard();
        }

        // Mark active filters
        document.querySelectorAll('.filter-chip').forEach(chip => {
          chip.classList.toggle('active',
            activeFilters[chip.dataset.filter] === chip.dataset.value);
        });

      } catch (e) {
        grid.innerHTML = `
          <div class="col-12 text-center py-5 text-danger">
            <i class="fa-solid fa-triangle-exclamation fa-2x mb-3"></i>
            <p>${e.message}</p>
            <small class="text-muted">Make sure the backend server is running on port 5000</small>
          </div>`;
      }
    }

    function clearAllFilters() {
      activeFilters = {};
      document.getElementById('search-input').value = '';
      document.getElementById('filter-category').value = '';
      document.getElementById('filter-sort').value = '';
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      loadFoods();
    }

    // Event listeners
    document.getElementById('search-input').addEventListener('input', Utils.debounce(loadFoods, 400));
    document.getElementById('filter-category').addEventListener('change', e => {
      if (e.target.value) activeFilters.category = e.target.value;
      else delete activeFilters.category;
      loadFoods();
    });
    document.getElementById('filter-sort').addEventListener('change', loadFoods);
    document.getElementById('clear-filters').addEventListener('click', clearAllFilters);

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const key = chip.dataset.filter;
        const val = chip.dataset.value;
        if (chip.classList.contains('active')) {
          chip.classList.remove('active');
          delete activeFilters[key];
        } else {
          document.querySelectorAll(`.filter-chip[data-filter="${key}"]`).forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeFilters[key] = val;
        }
        loadFoods();
      });
    });

    async function loadAIRecommendations() {
      const container = document.getElementById('ai-recommends-container');
      const grid = document.getElementById('ai-recommends-grid');
      const user = Utils.getUser();
      if (!user) return;

      try {
        const res = await API.getFoodRecommendations(user.id);
        const recommendations = res.data || [];
        if (recommendations.length > 0) {
          container.style.display = 'block';
          grid.innerHTML = recommendations.map(rec => `
            <div class="col-md-6 mb-2">
              <div class="p-3 rounded-4 border h-100 d-flex flex-column justify-content-between" style="background:var(--bg-card)">
                <div>
                  <h6 class="fw-bold mb-1">${rec.name}</h6>
                  <p class="small text-muted mb-2">${rec.reason}</p>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-2">
                  <span class="badge text-white" style="background:var(--gradient);font-size:0.75rem">Confidence: ${Math.round((rec.confidence || 0.8) * 100)}%</span>
                </div>
              </div>
            </div>`).join('');
        }
      } catch (err) {
        console.warn('AI recommendations load failed:', err);
      }
    }

    // Init
    loadCategories().then(() => {
      loadFoods();
      loadAIRecommendations();
    });
  </script>
</body>
</html>
