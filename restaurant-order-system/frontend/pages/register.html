<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — FoodHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <div class="page-header">
    <div class="container">
      <h1>Create Account</h1>
      <p>Register now to start ordering delicious food and earning reward points</p>
    </div>
  </div>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8">
          
          <div class="glass-card auth-card no-hover">
            <h4 class="fw-bold mb-4 text-center">Register</h4>
            
            <form id="register-form" novalidate>
              <div class="mb-3">
                <label class="form-label">Full Name *</label>
                <div class="input-group">
                  <span class="input-group-text" style="background: var(--bg-card); border: 1.5px solid var(--border); border-right: none; border-radius: 12px 0 0 12px;">
                    <i class="fa-solid fa-user text-muted"></i>
                  </span>
                  <input type="text" class="form-control" id="name" required placeholder="Ajith Kumar" style="border-radius: 0 12px 12px 0 !important;">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Email Address *</label>
                <div class="input-group">
                  <span class="input-group-text" style="background: var(--bg-card); border: 1.5px solid var(--border); border-right: none; border-radius: 12px 0 0 12px;">
                    <i class="fa-solid fa-envelope text-muted"></i>
                  </span>
                  <input type="email" class="form-control" id="email" required placeholder="name@example.com" style="border-radius: 0 12px 12px 0 !important;">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Phone Number *</label>
                <div class="input-group">
                  <span class="input-group-text" style="background: var(--bg-card); border: 1.5px solid var(--border); border-right: none; border-radius: 12px 0 0 12px;">+91</span>
                  <input type="tel" class="form-control" id="phone" pattern="[0-9]{10}" maxlength="10" required placeholder="9876543210" style="border-radius: 0 12px 12px 0 !important;">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Password *</label>
                <div class="input-group">
                  <span class="input-group-text" style="background: var(--bg-card); border: 1.5px solid var(--border); border-right: none; border-radius: 12px 0 0 12px;">
                    <i class="fa-solid fa-lock text-muted"></i>
                  </span>
                  <input type="password" class="form-control" id="password" required placeholder="••••••••" style="border-radius: 0 !important;">
                  <button class="btn btn-outline-secondary" type="button" id="toggle-pwd" style="border-radius: 0 12px 12px 0 !important; border: 1.5px solid var(--border); border-left: none;">
                    <i class="fa-solid fa-eye-slash" id="pwd-icon"></i>
                  </button>
                </div>
                <!-- Password Strength -->
                <div class="pwd-strength-bar">
                  <div class="bar-fill" id="strength-fill" style="width: 0%;"></div>
                </div>
                <small class="text-muted small mt-1 d-block" id="strength-text">Password strength</small>
              </div>

              <div class="mb-4">
                <label class="form-label">Confirm Password *</label>
                <div class="input-group">
                  <span class="input-group-text" style="background: var(--bg-card); border: 1.5px solid var(--border); border-right: none; border-radius: 12px 0 0 12px;">
                    <i class="fa-solid fa-circle-check text-muted"></i>
                  </span>
                  <input type="password" class="form-control" id="confirm-password" required placeholder="••••••••" style="border-radius: 0 12px 12px 0 !important;">
                </div>
              </div>

              <button type="submit" class="btn btn-primary-custom w-100 btn-lg mb-3">
                <i class="fa-solid fa-user-plus me-2"></i>Register
              </button>

              <p class="text-center small text-muted mb-0">
                Already have an account? <a href="login.html" class="text-primary fw-600">Login here</a>
              </p>
            </form>
          </div>

        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = Components.navbar();
    document.getElementById('footer').innerHTML = Components.footer();
    Theme.init();
    Cart.updateBadge();

    // Show/hide password
    const pwdInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-pwd');
    const icon = document.getElementById('pwd-icon');

    toggleBtn.addEventListener('click', () => {
      if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        icon.className = 'fa-solid fa-eye';
      } else {
        pwdInput.type = 'password';
        icon.className = 'fa-solid fa-eye-slash';
      }
    });

    // Password strength check
    pwdInput.addEventListener('input', e => {
      const val = e.target.value;
      const fill = document.getElementById('strength-fill');
      const text = document.getElementById('strength-text');
      
      let score = 0;
      if (val.length >= 6) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      if (val.length === 0) {
        fill.style.width = '0%';
        text.textContent = 'Password strength';
        text.className = 'text-muted small mt-1 d-block';
      } else if (score <= 1) {
        fill.style.width = '25%';
        fill.style.backgroundColor = 'var(--danger)';
        text.textContent = 'Weak password';
        text.className = 'text-danger small mt-1 d-block';
      } else if (score === 2) {
        fill.style.width = '50%';
        fill.style.backgroundColor = 'var(--warning)';
        text.textContent = 'Moderate password';
        text.className = 'text-warning small mt-1 d-block';
      } else if (score === 3) {
        fill.style.width = '75%';
        fill.style.backgroundColor = '#4361ee';
        text.textContent = 'Strong password';
        text.className = 'text-primary small mt-1 d-block';
      } else {
        fill.style.width = '100%';
        fill.style.backgroundColor = 'var(--success)';
        text.textContent = 'Excellent password!';
        text.className = 'text-success small mt-1 d-block';
      }
    });

    // Form submission
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = pwdInput.value;
      const confirmPwd = document.getElementById('confirm-password').value;

      if (!name || !email || !phone || !password || !confirmPwd) {
        Utils.showToast('Please fill out all fields', 'error');
        return;
      }

      if (password !== confirmPwd) {
        Utils.showToast('Passwords do not match', 'error');
        return;
      }

      if (phone.length !== 10) {
        Utils.showToast('Please enter a valid 10-digit phone number', 'error');
        return;
      }

      Utils.showLoader(true);
      try {
        await API.register({ name, email, phone, password, confirmPassword: password });
        Utils.showToast('Account created successfully! Please login.', 'success');
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);

      } catch (err) {
        Utils.showToast(err.message || 'Registration failed. Try using a different email.', 'error');
      } finally {
        Utils.showLoader(false);
      }
    });
  </script>
</body>
</html>
