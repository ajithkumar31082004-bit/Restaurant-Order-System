<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservation Confirmed — FoodHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
  <style>
    .confirm-page { min-height:80vh; display:flex; align-items:center; padding:4rem 0; }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="confirm-page">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6 text-center">

          <div class="success-checkmark mb-4">
            <i class="fa-solid fa-circle-check fa-4x text-success"></i>
          </div>

          <div class="glass-card no-hover p-4 p-md-5">
            <h2 class="fw-800 mb-1">Table Booked! 🎉</h2>
            <p class="text-muted mb-4">Your reservation has been confirmed by FoodHub</p>

            <div class="order-number-badge mb-4" id="res-id">—</div>

            <!-- Booking details -->
            <div class="text-start p-3 rounded-4 mb-4" style="background:var(--bg-card);border:1px solid var(--border)">
              <div class="row g-2 small">
                <div class="col-6 text-muted">Customer Name</div>
                <div class="col-6 text-end fw-bold" id="detail-name">—</div>

                <div class="col-6 text-muted">Table Assigned</div>
                <div class="col-6 text-end fw-bold text-success" id="detail-table">—</div>

                <div class="col-6 text-muted">Date & Time</div>
                <div class="col-6 text-end fw-bold" id="detail-datetime">—</div>

                <div class="col-6 text-muted">Guests Count</div>
                <div class="col-6 text-end fw-bold" id="detail-guests">—</div>

                <div class="col-6 text-muted">Area Preference</div>
                <div class="col-6 text-end fw-bold text-capitalize" id="detail-pref">—</div>
              </div>
            </div>

            <div class="row g-2">
              <div class="col-md-6">
                <a href="index.html" class="btn btn-outline-secondary w-100">
                  <i class="fa-solid fa-house me-2"></i>Return Home
                </a>
              </div>
              <div class="col-md-6">
                <a href="profile.html" class="btn btn-primary-custom w-100">
                  <i class="fa-solid fa-user me-2"></i>My Bookings
                </a>
              </div>
            </div>

          </div>

        </div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = Components.navbar();
    document.getElementById('footer').innerHTML = Components.footer();
    Theme.init();
    Cart.updateBadge();

    const lastRes = JSON.parse(sessionStorage.getItem('last_reservation') || 'null');

    if (lastRes) {
      document.getElementById('res-id').textContent = lastRes.reservation_id || 'RES000000';
      document.getElementById('detail-name').textContent = lastRes.customer_name;
      document.getElementById('detail-table').textContent = lastRes.table_number || lastRes.table_id || 'T-12';
      
      const formattedDate = new Date(lastRes.reservation_date).toLocaleDateString('en-IN', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
      document.getElementById('detail-datetime').textContent = `${formattedDate} @ ${lastRes.reservation_time.slice(0, 5)}`;
      document.getElementById('detail-guests').textContent = `${lastRes.guest_count} People`;
      document.getElementById('detail-pref').textContent = lastRes.table_preference;
    } else {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
