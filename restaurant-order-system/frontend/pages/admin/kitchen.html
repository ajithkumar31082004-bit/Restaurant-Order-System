<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard — FoodHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="admin-layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireAdmin()) throw new Error('Unauthorized');

    document.getElementById('admin-layout').innerHTML = Admin.layout('kitchen', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="mb-0 fw-bold">Kitchen Queue</h4>
          <p class="text-muted small mb-0">Live incoming orders and preparation tracker</p>
        </div>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" id="kitchen-filter-status" style="width:auto;">
            <option value="">Active Orders</option>
            <option value="new">New Queue</option>
            <option value="accepted">Accepted</option>
            <option value="preparing">Preparing</option>
            <option value="ready">Ready to Serve</option>
          </select>
          <button class="btn btn-outline-secondary btn-sm" id="refresh-kitchen">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
        </div>
      </div>

      <!-- Stats row -->
      <div class="row g-3 mb-4" id="kitchen-stats-row">
        <!-- Dynamically populated -->
      </div>

      <!-- Queue Cards Grid -->
      <div class="row g-3" id="kitchen-queue-grid">
        <div class="col-12 text-center py-4 text-muted"><div class="spinner-border"></div> Loading kitchen orders...</div>
      </div>
    `);

    async function loadKitchenQueue() {
      const grid = document.getElementById('kitchen-queue-grid');
      const status = document.getElementById('kitchen-filter-status').value;
      const query = status ? { status } : {};

      try {
        const res = await API.getKitchenOrders(query);
        const orders = res.data || [];

        if (orders.length === 0) {
          grid.innerHTML = '<div class="col-12 text-center text-muted py-5"><i class="fa-solid fa-circle-check fa-3x mb-3 text-success"></i><h5>Queue Clear!</h5><p class="small">No active pending orders in the kitchen.</p></div>';
          return;
        }

        grid.innerHTML = orders.map(o => {
          let itemsList = [];
          try {
            // Parse items list JSON or items array
            itemsList = typeof o.items === 'string' ? JSON.parse(o.items) : (o.items || []);
          } catch(e) {
            itemsList = [];
          }

          // Build status actions buttons
          let actionBtns = '';
          if (o.status === 'new') {
            actionBtns = `<button class="btn btn-primary-custom btn-sm w-100" onclick="updateKitchenStatus(${o.id}, 'accepted')"><i class="fa-solid fa-check me-1"></i>Accept</button>`;
          } else if (o.status === 'accepted') {
            actionBtns = `<button class="btn btn-warning btn-sm w-100" onclick="updateKitchenStatus(${o.id}, 'preparing')"><i class="fa-solid fa-fire me-1"></i>Start Prep</button>`;
          } else if (o.status === 'preparing') {
            actionBtns = `<button class="btn btn-success btn-sm w-100" onclick="updateKitchenStatus(${o.id}, 'ready')"><i class="fa-solid fa-circle-check me-1"></i>Mark Ready</button>`;
          } else if (o.status === 'ready') {
            actionBtns = `<button class="btn btn-info btn-sm w-100 text-white" onclick="updateKitchenStatus(${o.id}, 'served')"><i class="fa-solid fa-utensils me-1"></i>Served</button>`;
          }

          // Priority badge
          const priorityCls = o.priority === 'urgent' ? 'danger' : (o.priority === 'high' ? 'warning' : 'secondary');

          return `
            <div class="col-md-6 col-lg-4" id="kitchen-card-${o.id}">
              <div class="glass-card no-hover p-3 h-100 border d-flex flex-column" style="background:var(--bg-card)">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <div>
                    <strong class="text-primary">${o.order_ref || 'ORD' + o.order_id}</strong>
                    <div class="small text-muted">${o.order_type.toUpperCase()} · ${o.table_number || 'Delivery'}</div>
                  </div>
                  <span class="badge bg-${priorityCls}">${o.priority.toUpperCase()}</span>
                </div>
                
                <div class="small text-muted mb-2">
                  <i class="fa-regular fa-clock me-1"></i>Waiting: ${o.minutes_waiting || 0} mins
                </div>

                <hr class="my-2">
                <div class="flex-grow-1">
                  <h6 class="fw-bold small mb-2">Items to Prepare:</h6>
                  <ul class="list-unstyled mb-3 small">
                    ${itemsList.map(i => `
                      <li class="mb-1 d-flex align-items-center gap-2">
                        <input type="checkbox" class="form-check-input" style="cursor:pointer">
                        <span>${i.name} <strong>x${i.qty}</strong></span>
                      </li>`).join('')}
                  </ul>
                  ${o.notes ? `<div class="p-2 rounded bg-light text-muted small mb-3"><i class="fa-solid fa-circle-info me-1"></i>${o.notes}</div>` : ''}
                </div>

                <div class="mt-auto pt-2 border-top">
                  <div class="row g-1">
                    <div class="col-8">
                      ${actionBtns}
                    </div>
                    <div class="col-4">
                      <button class="btn btn-outline-danger btn-sm w-100" onclick="updateKitchenStatus(${o.id}, 'cancelled')">Reject</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>`;
        }).join('');

      } catch (err) {
        grid.innerHTML = `<div class="col-12 text-center py-4 text-danger">${err.message}</div>`;
      }
    }

    async function updateKitchenStatus(id, nextStatus) {
      try {
        await API.updateKitchenStatus(id, nextStatus);
        Utils.showToast(`Order marked ${nextStatus}`, 'success');
        loadKitchenQueue();
      } catch (err) {
        Utils.showToast(err.message, 'error');
      }
    }

    document.getElementById('kitchen-filter-status').addEventListener('change', loadKitchenQueue);
    document.getElementById('refresh-kitchen').addEventListener('click', loadKitchenQueue);

    // Initial load and set interval poll (e.g. 5 seconds for kitchen updates)
    loadKitchenQueue();
    setInterval(loadKitchenQueue, 5000);
  </script>
</body>
</html>
