<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Inventory — FoodHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="admin-layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireAdmin()) throw new Error('Unauthorized');

    document.getElementById('admin-layout').innerHTML = Admin.layout('inventory', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="mb-0 fw-bold">Inventory Management</h4>
          <p class="text-muted small mb-0">Raw stocks checklist and low stock alerts</p>
        </div>
        <button class="btn btn-outline-secondary btn-sm" id="refresh-inventory">
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
      </div>

      <!-- Low Stock Alerts Panel -->
      <div class="row g-3 mb-4" id="low-stock-panel" style="display:none;">
        <div class="col-12">
          <div class="alert alert-danger mb-0 rounded-4" role="alert">
            <h5 class="alert-heading fw-bold mb-2"><i class="fa-solid fa-triangle-exclamation me-2"></i>Critical Low Stock Warnings</h5>
            <ul class="mb-0 list-unstyled" id="low-stock-alerts-list">
              <!-- Dynamically populated -->
            </ul>
          </div>
        </div>
      </div>

      <!-- Inventory Table -->
      <div class="glass-card no-hover p-4">
        <div class="table-responsive hide-scroll">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Item Name</th>
                <th>Category</th>
                <th>Current Stock</th>
                <th>Unit</th>
                <th>Alert Threshold</th>
                <th>Unit Cost</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="inventory-table-body">
              <tr>
                <td colspan="7" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div> Loading inventory...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    `);

    async function loadInventory() {
      const tbody = document.getElementById('inventory-table-body');
      const alertPanel = document.getElementById('low-stock-panel');
      const alertsList = document.getElementById('low-stock-alerts-list');

      try {
        const [invRes, lowRes] = await Promise.all([
          API.getInventory(),
          API.getLowStockInventory()
        ]);

        const items = invRes.data || [];
        const lowItems = lowRes.data || [];

        // Low stock alerts
        if (lowItems.length > 0) {
          alertPanel.style.display = 'block';
          alertsList.innerHTML = lowItems.map(i => `
            <li class="mb-1">
              <i class="fa-solid fa-circle-exclamation me-1"></i>
              <strong>${i.item_name}</strong> is low! Remaining: <strong>${parseFloat(i.quantity).toFixed(2)} ${i.unit}</strong> (Threshold: ${i.low_stock_threshold} ${i.unit}). Restock required.
            </li>`).join('');
        } else {
          alertPanel.style.display = 'none';
        }

        // Populate table
        if (items.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No inventory items found.</td></tr>';
          return;
        }

        tbody.innerHTML = items.map(i => {
          const isLow = parseFloat(i.quantity) <= parseFloat(i.low_stock_threshold);
          return `
            <tr id="inv-row-${i.id}">
              <td><strong class="${isLow ? 'text-danger' : ''}">${i.item_name}</strong></td>
              <td><span class="badge bg-secondary text-capitalize">${i.category}</span></td>
              <td><strong class="${isLow ? 'text-danger' : ''}">${parseFloat(i.quantity).toFixed(2)}</strong></td>
              <td>${i.unit}</td>
              <td>${i.low_stock_threshold} ${i.unit}</td>
              <td>${Utils.formatPrice(i.cost_per_unit)}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-primary-custom" onclick="restockItem(${i.id}, '${i.item_name.replace(/'/g, "\\'")}', ${i.quantity})">
                  <i class="fa-solid fa-plus-circle me-1"></i>Restock
                </button>
              </td>
            </tr>`;
        }).join('');

      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger py-4">${err.message}</td></tr>`;
      }
    }

    function restockItem(id, itemName, currentQty) {
      Swal.fire({
        title: `Restock Item: ${itemName}`,
        text: `Current quantity: ${currentQty}`,
        input: 'number',
        inputAttributes: { min: 1, step: 1 },
        inputValue: 10,
        showCancelButton: true,
        confirmButtonText: 'Add to Stock',
        confirmButtonColor: '#ff6b35',
        customClass: { popup: 'rounded-4' }
      }).then(async (result) => {
        if (result.isConfirmed) {
          const addAmount = parseFloat(result.value);
          if (addAmount > 0) {
            try {
              // Record restock by updating stock qty
              const newQty = parseFloat(currentQty) + addAmount;
              await API.updateInventoryStock(id, newQty);
              Utils.showToast(`${itemName} restocked successfully`, 'success');
              loadInventory();
            } catch(err) {
              Utils.showToast(err.message, 'error');
            }
          }
        }
      });
    }

    document.getElementById('refresh-inventory').addEventListener('click', loadInventory);

    loadInventory();
  </script>
</body>
</html>
