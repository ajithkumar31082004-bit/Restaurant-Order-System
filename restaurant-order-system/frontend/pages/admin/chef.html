<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chef Kitchen Display — FoodHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
  <style>
    .kds-card { transition: all 0.3s ease; }
    .kds-card:hover { transform: translateY(-2px); }
    .kds-card.urgent  { border-left: 4px solid #dc3545 !important; }
    .kds-card.high    { border-left: 4px solid #ffc107 !important; }
    .kds-card.normal  { border-left: 4px solid #28a745 !important; }
    .timer-badge      { font-family: monospace; font-size: 0.9rem; font-weight: 700; }
    .item-check       { accent-color: var(--primary); }
    @keyframes pulse-urgent { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .urgent .timer-badge { animation: pulse-urgent 1.5s infinite; color: #dc3545; }
  </style>
</head>
<body>
  <div id="admin-layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireRole('chef', 'admin', 'manager')) throw new Error('Unauthorized');

    const chefNav = [
      { id: 'chef',    icon: 'fa-fire-burner',    label: 'Kitchen Display', href: 'chef.html'    },
      { id: 'kitchen', icon: 'fa-list-check',      label: 'Full Kitchen',    href: 'kitchen.html' },
    ];

    document.getElementById('admin-layout').innerHTML = Admin.staffLayout('chef', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="mb-0 fw-bold"><i class="fa-solid fa-fire-burner me-2" style="color:#e63946"></i>Chef Kitchen Display System</h4>
          <p class="text-muted small mb-0">Live order queue • Auto-refresh every 5 seconds</p>
        </div>
        <div class="d-flex gap-2 align-items-center">
          <div id="kds-stats" class="d-flex gap-2"></div>
          <select class="form-select form-select-sm" id="kds-filter" style="width:auto">
            <option value="">All Active</option>
            <option value="new">🆕 New</option>
            <option value="accepted">✅ Accepted</option>
            <option value="preparing">🔥 Preparing</option>
            <option value="ready">✔️ Ready</option>
          </select>
          <button class="btn btn-outline-secondary btn-sm" id="kds-refresh">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
          <span id="kds-clock" class="badge rounded-pill" style="background:rgba(230,57,70,0.12);color:#e63946;font-size:0.85rem;padding:0.5rem 1rem;font-weight:700"></span>
        </div>
      </div>

      <div class="row g-3" id="kds-grid">
        <div class="col-12 text-center py-5 text-muted">
          <div class="spinner-border" style="color:#e63946"></div>
          <p class="mt-2">Loading kitchen queue...</p>
        </div>
      </div>
    `, chefNav, 'Chef Portal');

    // Clock
    function tickClock() {
      const el = document.getElementById('kds-clock');
      if (el) el.textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    tickClock(); setInterval(tickClock, 1000);

    async function loadKDS() {
      const grid = document.getElementById('kds-grid');
      const filter = document.getElementById('kds-filter').value;
      try {
        const res = await API.getKitchenOrders(filter ? { status: filter } : {});
        const orders = res.data || [];

        // Stats
        const stats = { new: 0, accepted: 0, preparing: 0, ready: 0 };
        orders.forEach(o => { if (stats[o.status] !== undefined) stats[o.status]++; });
        document.getElementById('kds-stats').innerHTML = `
          <span class="badge bg-primary">${stats.new} New</span>
          <span class="badge bg-warning text-dark">${stats.accepted} Accepted</span>
          <span class="badge" style="background:#e63946">${stats.preparing} Cooking</span>
          <span class="badge bg-success">${stats.ready} Ready</span>`;

        if (!orders.length) {
          grid.innerHTML = `
            <div class="col-12 text-center py-5">
              <i class="fa-solid fa-circle-check fa-4x text-success mb-3"></i>
              <h5>Kitchen Queue Clear!</h5>
              <p class="text-muted small">No active orders. Standing by...</p>
            </div>`;
          return;
        }

        grid.innerHTML = orders.map(o => {
          let items = [];
          try { items = typeof o.items === 'string' ? JSON.parse(o.items) : (o.items || []); } catch(e) {}

          const priorityCls = o.priority === 'urgent' ? 'urgent' : (o.priority === 'high' ? 'high' : 'normal');
          const priorityBadge = o.priority === 'urgent'
            ? '<span class="badge bg-danger">🚨 URGENT</span>'
            : o.priority === 'high'
              ? '<span class="badge bg-warning text-dark">⚠️ HIGH</span>'
              : '<span class="badge bg-secondary">NORMAL</span>';

          const statusColors = { new: '#4361ee', accepted: '#ffba08', preparing: '#e63946', ready: '#28a745' };
          const statusColor = statusColors[o.status] || '#6c757d';

          let actionBtn = '';
          if (o.status === 'new')       actionBtn = `<button class="btn btn-sm w-100" style="background:#4361ee;color:#fff" onclick="changeStatus(${o.id},'accepted')"><i class="fa-solid fa-check me-1"></i>Accept Order</button>`;
          else if (o.status === 'accepted') actionBtn = `<button class="btn btn-sm w-100" style="background:#e63946;color:#fff" onclick="changeStatus(${o.id},'preparing')"><i class="fa-solid fa-fire me-1"></i>Start Cooking</button>`;
          else if (o.status === 'preparing') actionBtn = `<button class="btn btn-sm w-100 btn-success" onclick="changeStatus(${o.id},'ready')"><i class="fa-solid fa-circle-check me-1"></i>Mark Ready</button>`;
          else if (o.status === 'ready') actionBtn = `<button class="btn btn-sm w-100 btn-info text-white" onclick="changeStatus(${o.id},'served')"><i class="fa-solid fa-utensils me-1"></i>Served</button>`;

          return `
            <div class="col-md-6 col-xl-4" id="kds-card-${o.id}">
              <div class="glass-card no-hover p-3 h-100 d-flex flex-column kds-card ${priorityCls}" style="background:var(--bg-card)">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <div>
                    <div class="fw-bold" style="color:${statusColor};font-size:1rem">${o.order_ref || 'ORD-' + o.order_id}</div>
                    <div class="small text-muted">${(o.order_type || 'delivery').toUpperCase()} · ${o.table_number || 'Delivery'}</div>
                  </div>
                  <div class="text-end">
                    ${priorityBadge}
                    <div class="timer-badge mt-1">⏱ ${o.minutes_waiting || 0} min</div>
                  </div>
                </div>

                <div class="mb-2">
                  <span class="badge rounded-pill" style="background:${statusColor};font-size:0.7rem">${o.status?.toUpperCase()}</span>
                </div>

                <hr class="my-2">

                <div class="flex-grow-1">
                  <div class="small fw-bold mb-2 text-muted text-uppercase" style="font-size:0.7rem;letter-spacing:0.5px">Items to Prepare:</div>
                  <ul class="list-unstyled mb-3">
                    ${items.map((it, idx) => `
                      <li class="mb-2 d-flex align-items-center gap-2">
                        <input type="checkbox" class="form-check-input item-check" id="item-${o.id}-${idx}" style="cursor:pointer">
                        <label for="item-${o.id}-${idx}" class="small mb-0" style="cursor:pointer">
                          <strong>${it.name}</strong> <span class="text-muted">× ${it.qty || it.quantity}</span>
                        </label>
                      </li>`).join('')}
                  </ul>
                  ${o.notes ? `<div class="p-2 rounded-3 mb-2" style="background:rgba(255,186,8,0.1);border:1px solid rgba(255,186,8,0.3)"><i class="fa-solid fa-circle-info me-1 text-warning"></i><span class="small">${o.notes}</span></div>` : ''}
                </div>

                <div class="mt-auto pt-2 border-top">
                  <div class="row g-1">
                    <div class="col-9">${actionBtn}</div>
                    <div class="col-3">
                      <button class="btn btn-outline-danger btn-sm w-100" onclick="changeStatus(${o.id},'cancelled')" title="Reject">
                        <i class="fa-solid fa-xmark"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>`;
        }).join('');
      } catch (err) {
        grid.innerHTML = `<div class="col-12 text-danger text-center py-4"><i class="fa-solid fa-circle-exclamation fa-2x mb-2"></i><p>${err.message}</p></div>`;
      }
    }

    async function changeStatus(id, status) {
      try {
        await API.updateKitchenStatus(id, status);
        Utils.showToast(`Order marked as ${status}`, 'success');
        loadKDS();
      } catch (err) {
        Utils.showToast(err.message, 'error');
      }
    }

    document.getElementById('kds-filter').addEventListener('change', loadKDS);
    document.getElementById('kds-refresh').addEventListener('click', loadKDS);

    loadKDS();
    setInterval(loadKDS, 5000);
  </script>
</body>
</html>
