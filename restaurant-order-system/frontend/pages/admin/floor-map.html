<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floor Map — FoodHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
  <style>
    .floor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 1.5rem;
      padding: 1.5rem 0;
    }
    .table-node {
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--bg-card);
    }
    .table-node:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }
    .table-node.available { border-color: var(--success); color: var(--success); background: rgba(40,167,69,0.05); }
    .table-node.occupied { border-color: var(--danger); color: var(--danger); background: rgba(220,53,69,0.05); }
    .table-node.reserved { border-color: #4361ee; color: #4361ee; background: rgba(67,97,238,0.05); }
    .table-node.cleaning { border-color: var(--warning); color: var(--warning); background: rgba(255,193,7,0.05); }
    .table-node.inactive { border-color: var(--text-muted); color: var(--text-muted); opacity: 0.5; }
  </style>
</head>
<body>
  <div id="admin-layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireAdmin()) throw new Error('Unauthorized');

    document.getElementById('admin-layout').innerHTML = Admin.layout('floor-map', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="mb-0 fw-bold">Live Floor Map</h4>
          <p class="text-muted small mb-0">Track and manage seating layout and statuses</p>
        </div>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" id="floor-select" style="width:auto;">
            <option value="ground" selected>Ground Floor</option>
            <option value="first">First Floor</option>
            <option value="rooftop">Rooftop Garden</option>
          </select>
          <button class="btn btn-outline-secondary btn-sm" id="refresh-map">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
        </div>
      </div>

      <!-- Color Codes Legend -->
      <div class="glass-card no-hover p-3 mb-4">
        <div class="d-flex gap-4 justify-content-center flex-wrap small">
          <div><i class="fa-solid fa-circle text-success me-1"></i>Available</div>
          <div><i class="fa-solid fa-circle text-danger me-1"></i>Occupied</div>
          <div><i class="fa-solid fa-circle me-1" style="color:#4361ee"></i>Reserved</div>
          <div><i class="fa-solid fa-circle text-warning me-1"></i>Cleaning</div>
        </div>
      </div>

      <!-- Floor Grid Mapping -->
      <div class="glass-card no-hover p-4">
        <div class="floor-grid" id="floor-tables-grid">
          <!-- Dynamically populated -->
        </div>
      </div>
    `);

    async function loadFloorMap() {
      const grid = document.getElementById('floor-tables-grid');
      const floor = document.getElementById('floor-select').value;

      try {
        const res = await API.getTables({ floor });
        const tables = res.data || [];

        if (tables.length === 0) {
          grid.innerHTML = '<div class="col-12 text-center text-muted py-4">No tables found on this floor.</div>';
          return;
        }

        grid.innerHTML = tables.map(t => {
          const icon = t.table_type === 'vip' ? 'fa-crown' : (t.table_type === 'outdoor' ? 'fa-tree' : 'fa-utensils');
          return `
            <div class="table-node ${t.status}" onclick="changeTableStatus(${t.id}, '${t.table_number}', '${t.status}')">
              <i class="fa-solid ${icon} fa-2x mb-3"></i>
              <h5 class="fw-bold mb-1">${t.table_number}</h5>
              <div class="small mb-1 text-capitalize">${t.table_type}</div>
              <div class="small text-muted">Cap: ${t.capacity} pax</div>
            </div>`;
        }).join('');

      } catch (err) {
        grid.innerHTML = `<div class="text-danger text-center col-12 py-4">${err.message}</div>`;
      }
    }

    function changeTableStatus(id, tableNumber, currentStatus) {
      Swal.fire({
        title: `Manage Seating: ${tableNumber}`,
        text: `Update table status (current: ${currentStatus})`,
        input: 'select',
        inputOptions: {
          available: 'Available 🟢',
          occupied: 'Occupied 🔴',
          reserved: 'Reserved 🔵',
          cleaning: 'Cleaning 🟠',
          inactive: 'Inactive ⚪'
        },
        inputValue: currentStatus,
        showCancelButton: true,
        confirmButtonText: 'Update Status',
        confirmButtonColor: '#ff6b35',
        customClass: { popup: 'rounded-4' }
      }).then(async (result) => {
        if (result.isConfirmed) {
          try {
            await API.updateTableStatus(id, result.value);
            Utils.showToast(`Table ${tableNumber} updated successfully`, 'success');
            loadFloorMap();
          } catch(err) {
            Utils.showToast(err.message, 'error');
          }
        }
      });
    }

    document.getElementById('floor-select').addEventListener('change', loadFloorMap);
    document.getElementById('refresh-map').addEventListener('click', loadFloorMap);

    loadFloorMap();
  </script>
</body>
</html>
