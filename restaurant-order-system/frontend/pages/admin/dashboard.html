<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - FoodHub</title>
  <script>document.write(Admin?.head?.() || '')</script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="admin-layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireAdmin()) throw new Error('Unauthorized');

    document.getElementById('admin-layout').innerHTML = Admin.layout('dashboard', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Dashboard</h4>
        <div class="d-flex gap-2">
          <a href="${API.exportOrders()}" class="btn btn-outline-primary btn-sm" id="export-csv"><i class="fa-solid fa-file-csv me-1"></i>Export CSV</a>
          <button class="btn btn-outline-secondary btn-sm" onclick="window.print()"><i class="fa-solid fa-file-pdf me-1"></i>Export PDF</button>
        </div>
      </div>
      <div class="row g-4 mb-4" id="stat-cards">
        <div class="col-12 text-center py-5"><div class="spinner-border"></div></div>
      </div>
      <div class="row g-4 mb-4">
        <div class="col-lg-8">
          <div class="glass-card chart-container"><h6 class="mb-3">Daily Revenue (30 days)</h6><canvas id="dailyChart"></canvas></div>
        </div>
        <div class="col-lg-4">
          <div class="glass-card chart-container"><h6 class="mb-3">Peak Order Hours</h6><canvas id="peakChart"></canvas></div>
        </div>
      </div>
      <div class="row g-4" id="reports">
        <div class="col-lg-6">
          <div class="glass-card chart-container"><h6 class="mb-3">Monthly Revenue</h6><canvas id="monthlyChart"></canvas></div>
        </div>
        <div class="col-lg-6">
          <div class="glass-card p-4"><h6 class="mb-3">Top Selling Foods</h6><div id="top-foods"></div></div>
        </div>
      </div>
    `);

    let charts = {};

    async function loadDashboard() {
      try {
        const res = await API.getDashboard();
        const s = res.data;

        document.getElementById('stat-cards').innerHTML = `
          <div class="col-6 col-xl-2"><div class="glass-card dashboard-stat"><h3>${s.total_orders || 0}</h3><p>Total Orders</p></div></div>
          <div class="col-6 col-xl-2"><div class="glass-card dashboard-stat"><h3>${s.today_orders || 0}</h3><p>Today's Orders</p></div></div>
          <div class="col-6 col-xl-2"><div class="glass-card dashboard-stat"><h3>${Utils.formatPrice(s.total_revenue || 0)}</h3><p>Revenue</p></div></div>
          <div class="col-6 col-xl-2"><div class="glass-card dashboard-stat"><h3>${s.total_customers || 0}</h3><p>Customers</p></div></div>
          <div class="col-6 col-xl-2"><div class="glass-card dashboard-stat"><h3>${s.pending_orders || 0}</h3><p>Pending</p></div></div>
          <div class="col-6 col-xl-2"><div class="glass-card dashboard-stat"><h3>${s.delivered_orders || 0}</h3><p>Delivered</p></div></div>`;

        const daily = s.daily_revenue || [];
        charts.daily = new Chart(document.getElementById('dailyChart'), {
          type: 'line',
          data: {
            labels: daily.map(d => d.date),
            datasets: [{ label: 'Revenue (₹)', data: daily.map(d => d.revenue), borderColor: '#ff6b35', backgroundColor: 'rgba(255,107,53,0.1)', fill: true, tension: 0.4 }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });

        const peak = s.peak_hours || [];
        charts.peak = new Chart(document.getElementById('peakChart'), {
          type: 'bar',
          data: {
            labels: peak.map(p => `${p.hour}:00`),
            datasets: [{ label: 'Orders', data: peak.map(p => p.orders), backgroundColor: '#2ec4b6' }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });

        const monthly = s.monthly_revenue || [];
        charts.monthly = new Chart(document.getElementById('monthlyChart'), {
          type: 'bar',
          data: {
            labels: monthly.map(m => m.month),
            datasets: [{ label: 'Revenue (₹)', data: monthly.map(m => m.revenue), backgroundColor: '#ffba08' }]
          },
          options: { responsive: true, maintainAspectRatio: false }
        });

        const topFoods = s.top_foods || [];
        document.getElementById('top-foods').innerHTML = topFoods.length
          ? topFoods.map((f, i) => `<div class="d-flex justify-content-between align-items-center mb-3">
              <span><strong>#${i+1}</strong> ${f.name}</span>
              <span class="badge bg-primary">${f.total_sold || 0} sold</span></div>`).join('')
          : '<p class="text-muted">No sales data yet</p>';
      } catch (e) {
        Utils.showToast(e.message, 'error');
      }
    }

    document.getElementById('export-csv').addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(API.exportOrders().split('?')[0], {
          headers: { Authorization: 'Bearer ' + API.getToken() }
        });
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'orders-export.csv';
        a.click();
      } catch (err) {
        Utils.showToast('Export failed', 'error');
      }
    });

    loadDashboard();
  </script>
</body>
</html>
