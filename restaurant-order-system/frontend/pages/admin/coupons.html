<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Coupons — FoodHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="admin-layout"></div>

  <!-- Coupon Form Modal -->
  <div class="modal fade" id="couponModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="modal-title-text">Add Coupon</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pb-4">
          <form id="coupon-form">
            <div class="mb-3">
              <label class="form-label">Coupon Code *</label>
              <input type="text" class="form-control" id="cp-code" required placeholder="WELCOME10" style="text-transform: uppercase;">
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <input type="text" class="form-control" id="cp-desc" placeholder="10% off on first order">
            </div>
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label">Discount Type *</label>
                <select class="form-select" id="cp-type" required>
                  <option value="percentage">Percentage (%)</option>
                  <option value="fixed">Fixed Flat (₹)</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Value *</label>
                <input type="number" class="form-control" id="cp-value" required placeholder="10">
              </div>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label">Min Order Amount</label>
                <input type="number" class="form-control" id="cp-min" value="0">
              </div>
              <div class="col-6">
                <label class="form-label">Max Discount (Fixed)</label>
                <input type="number" class="form-control" id="cp-max" placeholder="e.g. 100">
              </div>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label">Valid From *</label>
                <input type="date" class="form-control" id="cp-from" required>
              </div>
              <div class="col-6">
                <label class="form-label">Valid Until *</label>
                <input type="date" class="form-control" id="cp-until" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100">
              Save Coupon
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireAdmin()) throw new Error('Unauthorized');

    document.getElementById('admin-layout').innerHTML = Admin.layout('coupons', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold">Manage Coupons</h4>
        <button class="btn btn-primary-custom btn-sm" id="btn-add-coupon">
          <i class="fa-solid fa-plus me-1"></i>Add Coupon
        </button>
      </div>

      <div class="glass-card no-hover p-4">
        <div class="table-responsive hide-scroll">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Code</th>
                <th>Discount</th>
                <th>Min Order</th>
                <th>Valid Until</th>
                <th>Used Count</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="coupons-table-body">
              <tr>
                <td colspan="6" class="text-center py-4 text-muted">Loading coupons...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    `);

    const cpModal = new bootstrap.Modal(document.getElementById('couponModal'));
    let editingId = null;

    async function loadCoupons() {
      try {
        const res = await API.getCoupons();
        const tbody = document.getElementById('coupons-table-body');
        const coupons = res.data || [];

        if (coupons.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No coupons found.</td></tr>';
          return;
        }

        tbody.innerHTML = coupons.map(c => `
          <tr id="cp-row-${c.id}">
            <td><span class="badge bg-primary" style="font-size:0.8rem;letter-spacing:1px">${c.code}</span></td>
            <td><strong class="text-primary">${c.discount_type === 'percentage' ? `${c.discount_value}%` : `₹${c.discount_value}`}</strong></td>
            <td><span>₹${c.min_order_amount || 0}</span></td>
            <td><span class="small text-muted">${Utils.formatDateOnly(c.valid_until)}</span></td>
            <td><span class="badge bg-secondary">${c.used_count || 0}</span></td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-secondary me-1" onclick="editCoupon(${c.id}, '${c.code}', '${c.description || ''}', '${c.discount_type}', ${c.discount_value}, ${c.min_order_amount}, ${c.max_discount || 0}, '${c.valid_from.split('T')[0]}', '${c.valid_until.split('T')[0]}')">
                <i class="fa-solid fa-pen"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteCoupon(${c.id})">
                <i class="fa-solid fa-trash"></i>
              </button>
            </td>
          </tr>`).join('');
      } catch (err) {
        Utils.showToast(err.message, 'error');
      }
    }

    document.getElementById('btn-add-coupon').addEventListener('click', () => {
      editingId = null;
      document.getElementById('modal-title-text').textContent = 'Add Coupon';
      document.getElementById('cp-code').value = '';
      document.getElementById('cp-desc').value = '';
      document.getElementById('cp-type').value = 'percentage';
      document.getElementById('cp-value').value = '';
      document.getElementById('cp-min').value = '0';
      document.getElementById('cp-max').value = '';
      document.getElementById('cp-from').value = new Date().toISOString().split('T')[0];
      document.getElementById('cp-until').value = '';
      cpModal.show();
    });

    function editCoupon(id, code, desc, type, val, min, max, from, until) {
      editingId = id;
      document.getElementById('modal-title-text').textContent = 'Edit Coupon';
      document.getElementById('cp-code').value = code;
      document.getElementById('cp-desc').value = desc;
      document.getElementById('cp-type').value = type;
      document.getElementById('cp-value').value = val;
      document.getElementById('cp-min').value = min;
      document.getElementById('cp-max').value = max || '';
      document.getElementById('cp-from').value = from;
      document.getElementById('cp-until').value = until;
      cpModal.show();
    }

    document.getElementById('coupon-form').addEventListener('submit', async e => {
      e.preventDefault();
      const code = document.getElementById('cp-code').value.trim().toUpperCase();
      const description = document.getElementById('cp-desc').value.trim();
      const discount_type = document.getElementById('cp-type').value;
      const discount_value = parseFloat(document.getElementById('cp-value').value);
      const min_order_amount = parseFloat(document.getElementById('cp-min').value) || 0;
      const max_discount = parseFloat(document.getElementById('cp-max').value) || null;
      const valid_from = document.getElementById('cp-from').value;
      const valid_until = document.getElementById('cp-until').value;

      const payload = { code, description, discount_type, discount_value, min_order_amount, max_discount, valid_from, valid_until };

      try {
        if (editingId) {
          await API.updateCoupon(editingId, payload);
          Utils.showToast('Coupon updated successfully!', 'success');
        } else {
          await API.createCoupon(payload);
          Utils.showToast('Coupon created successfully!', 'success');
        }
        cpModal.hide();
        loadCoupons();
      } catch (err) {
        Utils.showToast(err.message, 'error');
      }
    });

    async function deleteCoupon(id) {
      const confirm = await Utils.showConfirm('Delete Coupon?', 'Deleting this coupon cannot be undone.');
      if (confirm.isConfirmed) {
        try {
          await API.deleteCoupon(id);
          Utils.showToast('Coupon deleted successfully', 'info');
          loadCoupons();
        } catch (err) {
          Utils.showToast(err.message, 'error');
        }
      }
    }

    loadCoupons();
  </script>
</body>
</html>
