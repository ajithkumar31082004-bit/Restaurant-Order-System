<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Customers — FoodHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="admin-layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireAdmin()) throw new Error('Unauthorized');

    document.getElementById('admin-layout').innerHTML = Admin.layout('customers', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold">Manage Customers</h4>
        <button class="btn btn-outline-secondary btn-sm" id="refresh-customers">
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
      </div>

      <div class="glass-card no-hover p-4">
        <div class="table-responsive hide-scroll">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Customer ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Wallet Balance</th>
                <th>Reward Points</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="customers-table-body">
              <tr>
                <td colspan="7" class="text-center py-4 text-muted">Loading customers...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    `);

    async function loadCustomers() {
      const tbody = document.getElementById('customers-table-body');
      tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div> Loading customers...</td></tr>';
      
      try {
        const res = await API.getUsers();
        const users = res.data || [];

        const customers = users.filter(u => u.role === 'customer');

        if (customers.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No customers found.</td></tr>';
          return;
        }

        tbody.innerHTML = customers.map(u => `
          <tr id="user-row-${u.id}">
            <td><strong>#${u.id}</strong></td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div style="width:32px;height:32px;border-radius:50%;background:var(--gradient);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.75rem">
                  ${Utils.getAvatarInitials(u.name)}
                </div>
                <span class="fw-bold">${u.name}</span>
              </div>
            </td>
            <td><span>${u.email}</span></td>
            <td><span>${u.phone}</span></td>
            <td><strong>${Utils.formatPrice(u.wallet_balance || 0)}</strong></td>
            <td><span class="badge bg-warning text-dark"><i class="fa-solid fa-crown me-1"></i>${u.rewards_points || 0}</span></td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${u.id})">
                <i class="fa-solid fa-user-xmark"></i> Delete
              </button>
            </td>
          </tr>`).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger">${err.message}</td></tr>`;
      }
    }

    async function deleteCustomer(id) {
      const confirm = await Utils.showConfirm('Delete Customer?', 'Permanently delete this user account? This action is irreversible.');
      if (confirm.isConfirmed) {
        try {
          await API.deleteUser(id);
          Utils.showToast('Customer account deleted successfully', 'info');
          loadCustomers();
        } catch (err) {
          Utils.showToast(err.message, 'error');
        }
      }
    }

    document.getElementById('refresh-customers').addEventListener('click', loadCustomers);

    loadCustomers();
  </script>
</body>
</html>
