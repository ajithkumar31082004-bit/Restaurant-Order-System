<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Categories — FoodHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="admin-layout"></div>

  <!-- Add/Edit Category Modal -->
  <div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="modal-title-text">Add Category</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pb-4">
          <form id="category-form">
            <input type="hidden" id="category-id">
            <div class="mb-3">
              <label class="form-label">Category Name *</label>
              <input type="text" class="form-control" id="cat-name" required placeholder="e.g. Starters">
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="cat-desc" rows="2" placeholder="Appetizers and small bites"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Image URL / Path</label>
              <input type="text" class="form-control" id="cat-image" placeholder="/uploads/categories/starters.jpg">
            </div>
            <div class="mb-3">
              <label class="form-label">Sort Order</label>
              <input type="number" class="form-control" id="cat-sort" value="0">
            </div>
            <button type="submit" class="btn btn-primary-custom w-100">
              Save Category
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireAdmin()) throw new Error('Unauthorized');

    document.getElementById('admin-layout').innerHTML = Admin.layout('categories', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 fw-bold">Manage Categories</h4>
        <button class="btn btn-primary-custom btn-sm" id="btn-add-cat">
          <i class="fa-solid fa-plus me-1"></i>Add New
        </button>
      </div>

      <div class="glass-card no-hover p-4">
        <div class="table-responsive hide-scroll">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Icon</th>
                <th>Name</th>
                <th>Description</th>
                <th>Sort Order</th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="categories-table-body">
              <tr>
                <td colspan="6" class="text-center py-4 text-muted">Loading categories...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    `);

    const catModal = new bootstrap.Modal(document.getElementById('categoryModal'));
    let editingId = null;

    async function loadCategories() {
      try {
        const res = await API.getCategories();
        const tbody = document.getElementById('categories-table-body');
        const categories = res.data || [];

        if (categories.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No categories found.</td></tr>';
          return;
        }

        tbody.innerHTML = categories.map(c => `
          <tr id="cat-row-${c.id}">
            <td><strong>#${c.id}</strong></td>
            <td><i class="${Utils.categoryIcons[c.name] || 'fa-solid fa-utensils'} fa-lg text-primary"></i></td>
            <td><span class="fw-bold">${c.name}</span></td>
            <td><span class="small text-muted">${c.description || '—'}</span></td>
            <td><span class="badge bg-secondary">${c.sort_order || 0}</span></td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-secondary me-1" onclick="editCategory(${c.id}, '${c.name.replace(/'/g, "\\'")}', '${(c.description || '').replace(/'/g, "\\'")}', '${c.image || ''}', ${c.sort_order || 0})">
                <i class="fa-solid fa-pen"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${c.id})">
                <i class="fa-solid fa-trash"></i>
              </button>
            </td>
          </tr>`).join('');
      } catch (err) {
        Utils.showToast(err.message, 'error');
      }
    }

    document.getElementById('btn-add-cat').addEventListener('click', () => {
      editingId = null;
      document.getElementById('modal-title-text').textContent = 'Add Category';
      document.getElementById('category-id').value = '';
      document.getElementById('cat-name').value = '';
      document.getElementById('cat-desc').value = '';
      document.getElementById('cat-image').value = '';
      document.getElementById('cat-sort').value = '0';
      catModal.show();
    });

    function editCategory(id, name, desc, image, sort) {
      editingId = id;
      document.getElementById('modal-title-text').textContent = 'Edit Category';
      document.getElementById('category-id').value = id;
      document.getElementById('cat-name').value = name;
      document.getElementById('cat-desc').value = desc;
      document.getElementById('cat-image').value = image;
      document.getElementById('cat-sort').value = sort;
      catModal.show();
    }

    document.getElementById('category-form').addEventListener('submit', async e => {
      e.preventDefault();
      const name = document.getElementById('cat-name').value.trim();
      const description = document.getElementById('cat-desc').value.trim();
      const image = document.getElementById('cat-image').value.trim();
      const sort_order = parseInt(document.getElementById('cat-sort').value) || 0;

      const payload = { name, description, image, sort_order };

      try {
        if (editingId) {
          await API.updateCategory(editingId, payload);
          Utils.showToast('Category updated successfully!', 'success');
        } else {
          await API.createCategory(payload);
          Utils.showToast('Category created successfully!', 'success');
        }
        catModal.hide();
        loadCategories();
      } catch (err) {
        Utils.showToast(err.message, 'error');
      }
    });

    async function deleteCategory(id) {
      const confirm = await Utils.showConfirm('Delete Category?', 'Deleting this category might affect associated foods.');
      if (confirm.isConfirmed) {
        try {
          await API.deleteCategory(id);
          Utils.showToast('Category deleted successfully', 'info');
          loadCategories();
        } catch (err) {
          Utils.showToast(err.message, 'error');
        }
      }
    }

    loadCategories();
  </script>
</body>
</html>
