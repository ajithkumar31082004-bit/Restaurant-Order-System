<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders — FoodHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="admin-layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireAdmin()) throw new Error('Unauthorized');

    document.getElementById('admin-layout').innerHTML = Admin.layout('orders', `
      <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mb-4">
        <div>
          <h4 class="mb-0 fw-bold">Manage Orders</h4>
          <p class="text-muted small mb-0">View customer orders and manage statuses</p>
        </div>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm" id="filter-status" style="width:auto;">
            <option value="">All Statuses</option>
            <option value="Pending">Pending</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Preparing">Preparing</option>
            <option value="Cooking">Cooking</option>
            <option value="Packed">Packed</option>
            <option value="Out for Delivery">Out for Delivery</option>
            <option value="Delivered">Delivered</option>
            <option value="Cancelled">Cancelled</option>
          </select>
          <button class="btn btn-outline-secondary btn-sm" id="refresh-orders">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
        </div>
      </div>

      <div class="glass-card no-hover p-4">
        <div class="table-responsive hide-scroll">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer Details</th>
                <th>Order Items</th>
                <th>Payment</th>
                <th>Total</th>
                <th>Order Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders-table-body">
              <tr>
                <td colspan="7" class="text-center py-4 text-muted">Loading orders...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    `);

    const statuses = ['Pending', 'Confirmed', 'Preparing', 'Cooking', 'Packed', 'Out for Delivery', 'Delivered', 'Cancelled'];

    async function loadOrders() {
      const tbody = document.getElementById('orders-table-body');
      tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div> Loading orders...</td></tr>';
      
      try {
        const filterVal = document.getElementById('filter-status').value;
        const query = filterVal ? { status: filterVal } : {};
        const res = await API.request('/orders', { method: 'GET' }); // Will get all orders since logged in user is admin
        
        let orders = res.data || [];
        if (filterVal) {
          orders = orders.filter(o => o.order_status === filterVal);
        }

        if (orders.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No orders found.</td></tr>';
          return;
        }

        tbody.innerHTML = orders.map(o => {
          const itemsStr = o.items.map(i => `${i.food_name} x${i.quantity}`).join(', ');
          
          return `
          <tr id="order-row-${o.order_id}">
            <td>
              <strong class="text-primary">${o.order_id}</strong><br>
              <small class="text-muted">${Utils.formatDateOnly(o.created_at)}</small>
            </td>
            <td>
              <div class="fw-bold">${o.customer_name}</div>
              <div class="small text-muted">${o.customer_phone}</div>
              <div class="small text-muted" style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.delivery_address}, ${o.city}</div>
            </td>
            <td>
              <div class="small text-truncate" style="max-width:200px" title="${itemsStr}">${itemsStr}</div>
              <small class="text-muted">${o.items.length} unique items</small>
            </td>
            <td>${Utils.paymentBadge(o.payment_method)}</td>
            <td><strong>${Utils.formatPrice(o.total_amount)}</strong></td>
            <td>
              <select class="form-select form-select-sm" onchange="updateStatus('${o.order_id}', this.value)" style="width:auto;min-width:130px;">
                ${statuses.map(st => `<option value="${st}" ${o.order_status === st ? 'selected' : ''}>${st}</option>`).join('')}
              </select>
            </td>
            <td>
              <div class="d-flex gap-1">
                <a href="../track-order.html?orderId=${o.order_id}" class="btn btn-sm btn-outline-secondary" target="_blank" title="Track View">
                  <i class="fa-solid fa-map-location-dot"></i>
                </a>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteOrder('${o.order_id}')" title="Delete">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>`;
        }).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger">${err.message}</td></tr>`;
      }
    }

    async function updateStatus(orderId, newStatus) {
      try {
        await API.updateOrderStatus(orderId, newStatus);
        Utils.showToast(`Order ${orderId} updated to ${newStatus}`, 'success');
      } catch (err) {
        Utils.showToast(err.message, 'error');
        loadOrders(); // reload to reset status dropdown
      }
    }

    async function deleteOrder(orderId) {
      const confirm = await Utils.showConfirm('Delete Order?', `Deleting order ${orderId} will remove it from database records.`);
      if (confirm.isConfirmed) {
        try {
          await API.deleteOrder(orderId);
          Utils.showToast(`Order ${orderId} deleted successfully`, 'info');
          loadOrders();
        } catch (err) {
          Utils.showToast(err.message, 'error');
        }
      }
    }

    document.getElementById('filter-status').addEventListener('change', loadOrders);
    document.getElementById('refresh-orders').addEventListener('click', loadOrders);

    loadOrders();
  </script>
</body>
</html>
