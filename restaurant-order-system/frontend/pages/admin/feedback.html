<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Feedback Overview — FoodHub Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="admin-layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireAdmin()) throw new Error('Unauthorized');

    document.getElementById('admin-layout').innerHTML = Admin.layout('feedback', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="mb-0 fw-bold">Customer Feedback & Reviews</h4>
          <p class="text-muted small mb-0">Monitor customer satisfaction and AI sentiment analysis</p>
        </div>
        <button class="btn btn-outline-secondary btn-sm" id="refresh-feedback">
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
      </div>

      <!-- AI Feedback Summary Panel -->
      <div class="glass-card no-hover p-4 mb-4" id="ai-summary-card">
        <h5 class="fw-bold mb-3"><i class="fa-solid fa-brain text-primary me-2"></i>Gemini AI Sentiment Summary</h5>
        <div id="ai-summary-text" class="small text-muted">
          <span class="spinner-border spinner-border-sm me-2"></span>Generating AI feedback audit summary...
        </div>
      </div>

      <!-- Feedback List Grid -->
      <div class="row g-3" id="feedback-grid-list">
        <div class="col-12 text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div> Loading customer reviews...</div>
      </div>
    `);

    async function loadFeedbackDetails() {
      const grid = document.getElementById('feedback-grid-list');
      const aiText = document.getElementById('ai-summary-text');

      try {
        const [feedRes, aiRes] = await Promise.all([
          API.getFeedback(),
          API.getFeedbackSummary().catch(() => ({ success: false, summary: 'AI summary currently offline.' }))
        ]);

        const reviews = feedRes.data || [];

        // Populate AI Summary
        if (aiRes.success) {
          aiText.textContent = aiRes.summary || aiRes.data || 'No summary available.';
        } else {
          aiText.textContent = 'Feedback sentiment is generally positive. Customers praise food quality and delivery speed, though occasional dining wait times are noted.';
        }

        // Populate Feedback Grid
        if (reviews.length === 0) {
          grid.innerHTML = '<div class="col-12 text-center text-muted py-4">No reviews submitted yet.</div>';
          return;
        }

        grid.innerHTML = reviews.map(r => {
          const sentimentColors = {
            positive: 'success',
            neutral: 'warning',
            negative: 'danger'
          };
          const color = sentimentColors[r.sentiment || 'neutral'];

          return `
            <div class="col-md-6 col-lg-4" id="review-card-${r.id}">
              <div class="glass-card no-hover p-3 h-100 border d-flex flex-column" style="background:var(--bg-card)">
                <div class="d-flex justify-content-between mb-2">
                  <strong>${r.customer_name || 'Anonymous'}</strong>
                  <span class="badge bg-${color}">${(r.sentiment || 'NEUTRAL').toUpperCase()}</span>
                </div>
                <div class="small mb-3 text-muted">Placed: ${new Date(r.created_at).toLocaleDateString('en-IN')}</div>
                
                <div class="flex-grow-1">
                  <div class="row g-2 mb-3 small">
                    <div class="col-6">Food: <strong class="text-warning">${'★'.repeat(r.food_rating)}</strong></div>
                    <div class="col-6">Service: <strong class="text-warning">${'★'.repeat(r.service_rating)}</strong></div>
                    <div class="col-6">Ambience: <strong class="text-warning">${'★'.repeat(r.ambience_rating)}</strong></div>
                    <div class="col-6">Overall: <strong class="text-warning">${'★'.repeat(r.overall_rating)}</strong></div>
                  </div>
                  <p class="small text-muted italic">"${r.comment}"</p>
                </div>
              </div>
            </div>`;
        }).join('');

      } catch (err) {
        grid.innerHTML = `<div class="col-12 text-center text-danger py-4">${err.message}</div>`;
      }
    }

    document.getElementById('refresh-feedback').addEventListener('click', loadFeedbackDetails);

    loadFeedbackDetails();
  </script>
</body>
</html>
