<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Waiter Portal — FoodHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../../css/style.css" rel="stylesheet">
  <style>
    .req-card { transition: all 0.3s ease; }
    .req-card:hover { transform: translateY(-2px); }
    @keyframes bell-ring { 0%,100%{transform:rotate(0)} 20%{transform:rotate(15deg)} 40%{transform:rotate(-10deg)} 60%{transform:rotate(8deg)} 80%{transform:rotate(-5deg)} }
    .bell-icon { animation: bell-ring 2s ease-in-out infinite; display:inline-block; }
    .req-type-bill { border-left: 4px solid #ffc107; }
    .req-type-assistance { border-left: 4px solid #dc3545; }
    .req-type-water { border-left: 4px solid #17a2b8; }
    .req-type-food_ready { border-left: 4px solid #28a745; }
    .req-type-tissue { border-left: 4px solid #6c757d; }
    .table-chip { font-size:0.85rem; font-weight:700; border-radius:8px; padding:0.25rem 0.75rem; }
  </style>
</head>
<body>
  <div id="admin-layout"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    if (!Admin.requireRole('waiter', 'admin', 'manager')) throw new Error('Unauthorized');

    const waiterNav = [
      { id: 'waiter-portal', icon: 'fa-bell-concierge', label: 'My Service Board', href: 'waiter-portal.html' },
      { id: 'waiter',        icon: 'fa-list',            label: 'Full Waiter Board', href: 'waiter.html'        },
      { id: 'floor-map',     icon: 'fa-map',             label: 'Floor Map',         href: 'floor-map.html'     },
    ];

    document.getElementById('admin-layout').innerHTML = Admin.staffLayout('waiter-portal', `
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h4 class="mb-0 fw-bold"><i class="fa-solid fa-bell-concierge me-2" style="color:#2ec4b6"></i>Waiter Service Board</h4>
          <p class="text-muted small mb-0">Live customer requests • Auto-refresh every 5 seconds</p>
        </div>
        <div class="d-flex gap-2 align-items-center">
          <span id="req-count-badge" class="badge rounded-pill bg-danger" style="font-size:0.85rem;padding:0.5rem 1rem"></span>
          <span id="waiter-clock" class="badge rounded-pill" style="background:rgba(46,196,182,0.12);color:#2ec4b6;font-size:0.85rem;padding:0.5rem 1rem;font-weight:700"></span>
          <button class="btn btn-outline-secondary btn-sm" id="waiter-refresh"><i class="fa-solid fa-arrows-rotate"></i></button>
        </div>
      </div>

      <div class="row g-4">
        <!-- Active Requests -->
        <div class="col-lg-8">
          <div class="glass-card no-hover p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="fw-bold mb-0"><i class="fa-solid fa-bell me-2" style="color:#dc3545" id="bell-anim"></i>Active Requests</h5>
              <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-success" onclick="resolveAll()"><i class="fa-solid fa-check-double me-1"></i>Resolve All</button>
              </div>
            </div>
            <div class="row g-3" id="requests-board">
              <div class="col-12 text-center py-4"><div class="spinner-border" style="color:#2ec4b6"></div></div>
            </div>
          </div>
        </div>

        <!-- My Tables + Quick Actions -->
        <div class="col-lg-4">
          <!-- My Tables -->
          <div class="glass-card no-hover p-4 mb-4">
            <h5 class="fw-bold mb-3"><i class="fa-solid fa-border-all me-2 text-primary"></i>My Tables (Shift)</h5>
            <div id="my-tables-board">
              <div class="text-center text-muted py-3"><div class="spinner-border spinner-border-sm"></div></div>
            </div>
          </div>

          <!-- Quick Request Log -->
          <div class="glass-card no-hover p-4">
            <h5 class="fw-bold mb-3"><i class="fa-solid fa-clock-rotate-left me-2 text-warning"></i>Request Summary</h5>
            <div id="req-summary">
              <div class="text-center text-muted py-3"><div class="spinner-border spinner-border-sm"></div></div>
            </div>
          </div>
        </div>
      </div>
    `, waiterNav, 'Waiter Portal');

    // Clock
    function tickClock() {
      const el = document.getElementById('waiter-clock');
      if (el) el.textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    tickClock(); setInterval(tickClock, 1000);

    const reqIcons = {
      water:      { icon: 'fa-glass-water',   color: '#17a2b8', label: 'Water Request'    },
      bill:       { icon: 'fa-receipt',        color: '#ffc107', label: 'Bill Request'     },
      tissue:     { icon: 'fa-box',            color: '#6c757d', label: 'Tissue Request'   },
      assistance: { icon: 'fa-bell',           color: '#dc3545', label: 'General Help'     },
      food_ready: { icon: 'fa-utensils',       color: '#28a745', label: 'Food Ready'       },
    };

    let currentRequests = [];

    async function loadWaiterBoard() {
      const board = document.getElementById('requests-board');
      const tables = document.getElementById('my-tables-board');
      const summary = document.getElementById('req-summary');
      const countBadge = document.getElementById('req-count-badge');

      try {
        const [reqRes, tablesRes] = await Promise.all([
          API.getWaiterRequests(),
          API.request('/waiter/tables')
        ]);
        currentRequests = reqRes.data || [];
        const myTables = tablesRes.data || [];

        // Badge
        countBadge.textContent = currentRequests.length > 0 ? currentRequests.length + ' Pending' : '✓ All Clear';
        countBadge.className = `badge rounded-pill ${currentRequests.length > 0 ? 'bg-danger' : 'bg-success'}`;

        // Bell animation on new requests
        const bellEl = document.getElementById('bell-anim');
        if (bellEl) bellEl.className = currentRequests.length > 0 ? 'fa-solid fa-bell bell-icon me-2' : 'fa-solid fa-bell me-2 text-success';

        // Requests
        if (!currentRequests.length) {
          board.innerHTML = `<div class="col-12 text-center py-5">
            <i class="fa-solid fa-face-smile fa-3x text-success mb-3"></i>
            <h6>All requests resolved!</h6>
            <p class="small text-muted">Waiting for customer calls...</p>
          </div>`;
        } else {
          board.innerHTML = currentRequests.map(r => {
            const meta = reqIcons[r.request_type] || { icon: 'fa-bell', color: '#6c757d', label: r.request_type };
            const timeAgo = getTimeAgo(r.created_at);
            return `
              <div class="col-md-6" id="req-${r.id}">
                <div class="p-3 rounded-4 border req-card req-type-${r.request_type}" style="background:var(--bg-card)">
                  <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="table-chip" style="background:rgba(46,196,182,0.12);color:#2ec4b6">
                      <i class="fa-solid fa-chair me-1"></i>Table ${r.table_number || 'T-??'}
                    </span>
                    <span class="small text-muted">${timeAgo}</span>
                  </div>
                  <div class="d-flex align-items-center gap-2 mb-2">
                    <i class="fa-solid ${meta.icon} fa-lg" style="color:${meta.color}"></i>
                    <strong>${meta.label}</strong>
                  </div>
                  ${r.message ? `<p class="small text-muted mb-2 p-2 rounded-3" style="background:var(--bg)">${r.message}</p>` : ''}
                  <button class="btn btn-success btn-sm w-100" onclick="resolveReq(${r.id})">
                    <i class="fa-solid fa-check me-1"></i>Mark Resolved
                  </button>
                </div>
              </div>`;
          }).join('');
        }

        // Summary
        const typeCounts = {};
        currentRequests.forEach(r => { typeCounts[r.request_type] = (typeCounts[r.request_type] || 0) + 1; });
        summary.innerHTML = Object.keys(typeCounts).length ? Object.entries(typeCounts).map(([type, count]) => {
          const meta = reqIcons[type] || { icon: 'fa-bell', color: '#6c757d', label: type };
          return `<div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
            <div><i class="fa-solid ${meta.icon} me-2" style="color:${meta.color}"></i>${meta.label}</div>
            <span class="badge rounded-pill" style="background:${meta.color}">${count}</span>
          </div>`;
        }).join('') : '<p class="text-muted text-center small mb-0">No active requests</p>';

        // Tables
        tables.innerHTML = myTables.length ? myTables.map(t => {
          const statusColor = t.status === 'available' ? '#28a745' : (t.status === 'occupied' ? '#dc3545' : '#ffc107');
          return `<div class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom">
            <div>
              <div class="fw-bold">Table ${t.table_number}</div>
              <div class="text-muted small">${(t.table_type || 'standard').toUpperCase()} · ${t.capacity} seats</div>
            </div>
            <span class="badge rounded-pill" style="background:${statusColor}">${t.status}</span>
          </div>`;
        }).join('') : '<p class="text-muted text-center small mb-0">No tables assigned this shift.</p>';

      } catch (err) {
        board.innerHTML = `<div class="col-12 text-danger text-center py-4">${err.message}</div>`;
      }
    }

    function getTimeAgo(dateStr) {
      const mins = Math.floor((Date.now() - new Date(dateStr)) / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return mins + ' min ago';
      return Math.floor(mins / 60) + ' hr ago';
    }

    async function resolveReq(id) {
      try {
        await API.resolveWaiterRequest(id);
        Utils.showToast('Request resolved ✓', 'success');
        document.getElementById('req-' + id)?.remove();
        loadWaiterBoard();
      } catch (err) { Utils.showToast(err.message, 'error'); }
    }

    async function resolveAll() {
      if (!currentRequests.length) { Utils.showToast('No pending requests', 'info'); return; }
      for (const r of currentRequests) {
        try { await API.resolveWaiterRequest(r.id); } catch(e) {}
      }
      Utils.showToast('All requests resolved!', 'success');
      loadWaiterBoard();
    }

    document.getElementById('waiter-refresh').addEventListener('click', loadWaiterBoard);

    loadWaiterBoard();
    setInterval(loadWaiterBoard, 5000);
  </script>
</body>
</html>
