<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Feedback — FoodHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
  <style>
    .star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 0.25rem; }
    .star-rating input { display: none; }
    .star-rating label { font-size: 1.8rem; color: #ccc; cursor: pointer; transition: color 0.2s; }
    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label { color: #ffba08; }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="page-header">
    <div class="container text-center">
      <h1><i class="fa-solid fa-comment-dots me-2"></i>Post-Dining Feedback</h1>
      <p class="text-muted">Help us improve! Tell us how your dining experience was.</p>
    </div>
  </div>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">

          <div class="glass-card no-hover p-4 p-md-5">
            <h4 class="fw-bold mb-4 text-center">Rate Your Visit</h4>

            <form id="feedback-form">
              <!-- Name & Order Info -->
              <div class="row g-3 mb-4">
                <div class="col-md-6">
                  <label class="form-label">Your Name</label>
                  <input type="text" class="form-control" id="fd-cust-name" placeholder="e.g. Ajith Kumar">
                </div>
                <div class="col-md-6">
                  <label class="form-label">Order ID (optional)</label>
                  <input type="text" class="form-control" id="fd-order-id" placeholder="e.g. ORD1025">
                </div>
              </div>

              <!-- Rating Matrices -->
              <div class="row g-4 mb-4">
                <!-- Food Rating -->
                <div class="col-md-6">
                  <label class="form-label fw-bold d-block">Food Quality</label>
                  <div class="star-rating" id="rating-food">
                    <input type="radio" name="food_rating" id="food-5" value="5"><label for="food-5">★</label>
                    <input type="radio" name="food_rating" id="food-4" value="4"><label for="food-4">★</label>
                    <input type="radio" name="food_rating" id="food-3" value="3"><label for="food-3">★</label>
                    <input type="radio" name="food_rating" id="food-2" value="2"><label for="food-2">★</label>
                    <input type="radio" name="food_rating" id="food-1" value="1" checked><label for="food-1">★</label>
                  </div>
                </div>

                <!-- Service Rating -->
                <div class="col-md-6">
                  <label class="form-label fw-bold d-block">Service</label>
                  <div class="star-rating" id="rating-service">
                    <input type="radio" name="service_rating" id="service-5" value="5"><label for="service-5">★</label>
                    <input type="radio" name="service_rating" id="service-4" value="4"><label for="service-4">★</label>
                    <input type="radio" name="service_rating" id="service-3" value="3"><label for="service-3">★</label>
                    <input type="radio" name="service_rating" id="service-2" value="2"><label for="service-2">★</label>
                    <input type="radio" name="service_rating" id="service-1" value="1" checked><label for="service-1">★</label>
                  </div>
                </div>

                <!-- Ambience Rating -->
                <div class="col-md-6">
                  <label class="form-label fw-bold d-block">Ambience</label>
                  <div class="star-rating" id="rating-ambience">
                    <input type="radio" name="ambience_rating" id="ambience-5" value="5"><label for="ambience-5">★</label>
                    <input type="radio" name="ambience_rating" id="ambience-4" value="4"><label for="ambience-4">★</label>
                    <input type="radio" name="ambience_rating" id="ambience-3" value="3"><label for="ambience-3">★</label>
                    <input type="radio" name="ambience_rating" id="ambience-2" value="2"><label for="ambience-2">★</label>
                    <input type="radio" name="ambience_rating" id="ambience-1" value="1" checked><label for="ambience-1">★</label>
                  </div>
                </div>

                <!-- Overall Rating -->
                <div class="col-md-6">
                  <label class="form-label fw-bold d-block">Overall Experience</label>
                  <div class="star-rating" id="rating-overall">
                    <input type="radio" name="overall_rating" id="overall-5" value="5"><label for="overall-5">★</label>
                    <input type="radio" name="overall_rating" id="overall-4" value="4"><label for="overall-4">★</label>
                    <input type="radio" name="overall_rating" id="overall-3" value="3"><label for="overall-3">★</label>
                    <input type="radio" name="overall_rating" id="overall-2" value="2"><label for="overall-2">★</label>
                    <input type="radio" name="overall_rating" id="overall-1" value="1" checked><label for="overall-1">★</label>
                  </div>
                </div>
              </div>

              <!-- Comment box -->
              <div class="mb-4">
                <label class="form-label fw-bold">Comments / Suggestions</label>
                <textarea class="form-control" id="fd-comment" rows="3" required placeholder="Write your dining comments here..."></textarea>
              </div>

              <button type="submit" class="btn btn-primary-custom w-100 btn-lg" id="submit-feedback-btn">
                <i class="fa-solid fa-paper-plane me-1"></i>Submit Feedback
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = Components.navbar();
    document.getElementById('footer').innerHTML = Components.footer();
    Theme.init();
    Cart.updateBadge();

    // Autofill user details
    const user = Utils.getUser();
    if (user) {
      document.getElementById('fd-cust-name').value = user.name || '';
    }

    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('orderId');
    if (orderId) {
      document.getElementById('fd-order-id').value = orderId;
    }

    // Submit form handler
    document.getElementById('feedback-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const customer_name = document.getElementById('fd-cust-name').value.trim() || 'Anonymous';
      const order_id_val = document.getElementById('fd-order-id').value.trim();
      const comment = document.getElementById('fd-comment').value.trim();

      const food_rating = parseInt(document.querySelector('input[name="food_rating"]:checked').value, 10);
      const service_rating = parseInt(document.querySelector('input[name="service_rating"]:checked').value, 10);
      const ambience_rating = parseInt(document.querySelector('input[name="ambience_rating"]:checked').value, 10);
      const overall_rating = parseInt(document.querySelector('input[name="overall_rating"]:checked').value, 10);

      const btn = document.getElementById('submit-feedback-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Submitting...';

      // Load matched order database ID if available
      let order_id = null;
      if (order_id_val) {
        try {
          const ordRes = await API.getOrder(order_id_val);
          if (ordRes.success && ordRes.data) {
            order_id = ordRes.data.id;
          }
        } catch {}
      }

      const payload = {
        customer_name,
        order_id,
        food_rating,
        service_rating,
        ambience_rating,
        overall_rating,
        comment
      };

      try {
        await API.submitFeedback(payload);
        
        Swal.fire({
          icon: 'success',
          title: 'Thank You! ❤️',
          text: 'Your feedback was submitted and analyzed.',
          confirmButtonColor: '#ff6b35',
          confirmButtonText: 'Return Home',
          customClass: { popup: 'rounded-4' }
        }).then(() => {
          window.location.href = 'index.html';
        });

      } catch (err) {
        Utils.showToast(err.message || 'Submission failed. Please try again.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane me-1"></i>Submit Feedback';
      }
    });
  </script>
</body>
</html>
