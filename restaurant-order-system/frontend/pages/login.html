<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FoodHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <div class="page-header">
    <div class="container">
      <h1>Welcome Back</h1>
      <p>Sign in to your account to order delicious meals</p>
    </div>
  </div>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8">
          
          <div class="glass-card auth-card no-hover">
            <h4 class="fw-bold mb-4 text-center">Login</h4>
            
            <form id="login-form" novalidate>
              <div class="mb-3">
                <label class="form-label">Email Address *</label>
                <div class="input-group">
                  <span class="input-group-text" style="background: var(--bg-card); border: 1.5px solid var(--border); border-right: none; border-radius: 12px 0 0 12px;">
                    <i class="fa-solid fa-envelope text-muted"></i>
                  </span>
                  <input type="email" class="form-control" id="email" required placeholder="name@example.com" style="border-radius: 0 12px 12px 0 !important;">
                </div>
              </div>

              <div class="mb-3">
                <div class="d-flex justify-content-between">
                  <label class="form-label">Password *</label>
                  <a href="#" class="small text-primary fw-600" id="forgot-password-link">Forgot Password?</a>
                </div>
                <div class="input-group">
                  <span class="input-group-text" style="background: var(--bg-card); border: 1.5px solid var(--border); border-right: none; border-radius: 12px 0 0 12px;">
                    <i class="fa-solid fa-lock text-muted"></i>
                  </span>
                  <input type="password" class="form-control" id="password" required placeholder="••••••••" style="border-radius: 0 !important;">
                  <button class="btn btn-outline-secondary" type="button" id="toggle-pwd" style="border-radius: 0 12px 12px 0 !important; border: 1.5px solid var(--border); border-left: none;">
                    <i class="fa-solid fa-eye-slash" id="pwd-icon"></i>
                  </button>
                </div>
              </div>

              <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                  <input type="checkbox" class="form-check-input" id="remember-me" style="cursor: pointer;">
                  <label class="form-check-label small" for="remember-me" style="cursor: pointer;">Remember me</label>
                </div>
              </div>

              <button type="submit" class="btn btn-primary-custom w-100 btn-lg mb-3">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Login
              </button>

              <p class="text-center small text-muted mb-0">
                Don't have an account? <a href="register.html" class="text-primary fw-600">Register now</a>
              </p>
            </form>
          </div>

        </div>
      </div>
    </div>
  </section>

  <!-- Forgot Password Modal -->
  <div class="modal fade" id="forgotPwdModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold">Reset Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pb-4">
          <p class="small text-muted mb-3">Enter your registered email address and we'll send a password recovery link to your inbox.</p>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="reset-email" placeholder="name@example.com">
          </div>
          <button type="button" class="btn btn-primary-custom w-100" id="send-reset-btn">
            Send Reset Link
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = Components.navbar();
    document.getElementById('footer').innerHTML = Components.footer();
    Theme.init();
    Cart.updateBadge();

    // Redirect handler
    const params = new URLSearchParams(window.location.search);
    const redirectUrl = params.get('redirect') || '/';

    // Show/hide password logic
    const pwdInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-pwd');
    const icon = document.getElementById('pwd-icon');
    
    toggleBtn.addEventListener('click', () => {
      if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        icon.className = 'fa-solid fa-eye';
      } else {
        pwdInput.type = 'password';
        icon.className = 'fa-solid fa-eye-slash';
      }
    });

    // Forgot password modal
    const forgotModal = new bootstrap.Modal(document.getElementById('forgotPwdModal'));
    document.getElementById('forgot-password-link').addEventListener('click', e => {
      e.preventDefault();
      forgotModal.show();
    });

    document.getElementById('send-reset-btn').addEventListener('click', () => {
      const email = document.getElementById('reset-email').value.trim();
      if (!email) {
        Utils.showToast('Please enter your email', 'error');
        return;
      }
      forgotModal.hide();
      Utils.showToast('Password reset link sent to ' + email, 'success');
    });

    // Handle Login Submit
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = pwdInput.value;

      if (!email || !password) {
        Utils.showToast('Please fill out all fields', 'error');
        return;
      }

      Utils.showLoader(true);
      try {
        const res = await API.login({ email, password });
        // Backend returns { success, data: { user, token } }
        const { token, user } = res.data;
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(user));
        
        Utils.showToast('Logged in successfully! Welcome back.', 'success');
        
        setTimeout(() => {
          // If there is an explicit redirect param, honour it
          if (redirectUrl && redirectUrl !== '/') {
            window.location.href = redirectUrl;
            return;
          }
          // Otherwise route by role to the dedicated portal
          const rolePortals = {
            admin:    '/pages/admin/dashboard.html',
            manager:  '/pages/admin/manager.html',
            chef:     '/pages/admin/chef.html',
            waiter:   '/pages/admin/waiter-portal.html',
            cashier:  '/pages/admin/cashier.html',
          };
          window.location.href = rolePortals[user.role] || '/pages/index.html';
        }, 1200);

      } catch (err) {
        Utils.showToast(err.message || 'Login failed. Please check your credentials.', 'error');
      } finally {
        Utils.showLoader(false);
      }
    });
  </script>
</body>
</html>
