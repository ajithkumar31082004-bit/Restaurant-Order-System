<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pre-Schedule Order — FoodHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>

  <div class="page-header">
    <div class="container text-center">
      <h1><i class="fa-solid fa-clock-rotate-left me-2"></i>Schedule Future Order</h1>
      <p class="text-muted">Pre-order your favorite meal in advance and choose a custom delivery or pickup slot</p>
    </div>
  </div>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">

          <div class="glass-card no-hover p-4 p-md-5">
            <h4 class="fw-bold mb-4 text-center">Select Scheduling Slot</h4>

            <form id="schedule-form">
              <!-- Select order type -->
              <div class="mb-3">
                <label class="form-label d-block">Order Type</label>
                <div class="row g-2">
                  <div class="col-6">
                    <input type="radio" class="btn-check" name="sched_type" id="sched-delivery" value="delivery" checked>
                    <label class="btn btn-outline-primary w-100" for="sched-delivery" style="border-radius:12px;padding:0.65rem">
                      <i class="fa-solid fa-truck me-1"></i>Delivery
                    </label>
                  </div>
                  <div class="col-6">
                    <input type="radio" class="btn-check" name="sched_type" id="sched-takeaway" value="takeaway">
                    <label class="btn btn-outline-primary w-100" for="sched-takeaway" style="border-radius:12px;padding:0.65rem">
                      <i class="fa-solid fa-bag-shopping me-1"></i>Pickup / Takeaway
                    </label>
                  </div>
                </div>
              </div>

              <!-- Date & Time selection -->
              <div class="row g-3 mb-4">
                <div class="col-md-6">
                  <label class="form-label">Scheduled Date *</label>
                  <input type="date" class="form-control" id="sched-date" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Scheduled Time *</label>
                  <input type="time" class="form-control" id="sched-time" required>
                </div>
              </div>

              <!-- Notes -->
              <div class="mb-4">
                <label class="form-label">Special Delivery / Pickup Notes</label>
                <textarea class="form-control" id="sched-notes" rows="2" placeholder="e.g. Leave package with security desk, prepare fresh at pickup time..."></textarea>
              </div>

              <button type="submit" class="btn btn-primary-custom w-100 btn-lg" id="submit-schedule-btn">
                <i class="fa-solid fa-circle-check me-1"></i>Confirm Schedule & Browse Menu
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = Components.navbar();
    document.getElementById('footer').innerHTML = Components.footer();
    Theme.init();
    Cart.updateBadge();

    // Min date setup
    const dateInput = document.getElementById('sched-date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.min = today;
    dateInput.value = today;

    document.getElementById('schedule-form').addEventListener('submit', (e) => {
      e.preventDefault();

      const type = document.querySelector('input[name="sched_type"]:checked').value;
      const date = dateInput.value;
      const time = document.getElementById('sched-time').value;
      const notes = document.getElementById('sched-notes').value.trim();

      if (!date || !time) {
        Utils.showToast('Please select date and time', 'error');
        return;
      }

      // Save scheduled timestamp in session storage
      const scheduledTimestamp = `${date}T${time}:00`;
      sessionStorage.setItem('scheduled_at', scheduledTimestamp);
      sessionStorage.setItem('order_type', type);
      sessionStorage.setItem('order_notes', notes ? `[Scheduled for ${date} ${time}] ${notes}` : `[Scheduled for ${date} ${time}]`);

      Swal.fire({
        icon: 'success',
        title: 'Schedule Saved! ⏰',
        text: `Now browse our menu and add items to your scheduled cart.`,
        confirmButtonColor: '#ff6b35',
        confirmButtonText: 'Go to Menu',
        customClass: { popup: 'rounded-4' }
      }).then(() => {
        window.location.href = 'menu.html';
      });
    });
  </script>
</body>
</html>
