version: '3.9'

# ─────────────────────────────────────────────────────────────
#  FoodHub — Production Docker Compose Override
#  Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#  NOTE: No local MySQL — production uses AWS RDS.
# ─────────────────────────────────────────────────────────────

services:

  # No mysql service in production (uses AWS RDS)

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    environment:
      - NODE_ENV=production
      # DB_HOST, DB_USER, DB_PASSWORD etc. come from .env.production or secrets
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    labels:
      - "com.foodhub.env=production"
      - "com.foodhub.version=2.0.0"
